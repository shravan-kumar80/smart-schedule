<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Schedule | Modern Authentication & Scheduling</title>
    <meta name="description" content="Manage your team's schedule with Smart Schedule. The most advanced scheduling app for modern teams.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-content">
                <div class="logo" onclick="navigateTo('landing')">
                    <i data-lucide="calendar"></i>
                    <span>Smart Schedule</span>
                </div>
                <div class="nav-links">
                    <button id="theme-toggle" class="btn btn-ghost" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    <button class="btn btn-ghost" onclick="navigateTo('login')">Login</button>
                    <button class="btn btn-primary" onclick="navigateTo('register')">Get Started</button>
                </div>
            </div>
        </nav>

        <!-- Views -->
        <main id="main-view">
            <!-- Content will be injected here by app.js -->
        </main>

        <footer class="footer">
            <p>&copy; 2026 Smart Schedule. All rights reserved.</p>
        </footer>
    </div>

    <!-- Templates -->
    <template id="landing-template">
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="fade-in">Optimize Your Time with <span class="gradient-text">Smart Schedule</span></h1>
                <p class="fade-in-delay">The intelligent way to manage shifts, tasks, and team coordination in one seamless platform.</p>
                <div class="hero-actions fade-in-delay-2">
                    <button class="btn btn-primary btn-lg" onclick="navigateTo('register')">Start Free Trial</button>
                    <button class="btn btn-secondary btn-lg" onclick="navigateTo('login')">Sign In</button>
                </div>
            </div>
            <div class="hero-image-container">
                <img src="assets/hero.png" alt="Smart Schedule Interface" class="hero-image">
            </div>
        </section>

        <section class="features-section">
            <h2 class="section-title">Powerful Features</h2>
            <div class="features-grid">
                <div class="feature-card">
                    <i data-lucide="clock"></i>
                    <h3>Real-time Tracking</h3>
                    <p>Monitor progress and time allocation as it happens across your entire team.</p>
                </div>
                <div class="feature-card">
                    <i data-lucide="users"></i>
                    <h3>Team Collaboration</h3>
                    <p>Roles and permissions tailored for Admins, Managers, and Employees.</p>
                </div>
                <div class="feature-card">
                    <i data-lucide="zap"></i>
                    <h3>AI Automation</h3>
                    <p>Let our smart algorithms suggest the optimal schedule based on availability.</p>
                </div>
            </div>
        </section>

        <section class="testimonials-section">
            <h2 class="section-title">Loved by Teams</h2>
            <div class="testimonials-grid">
                <div class="testimonial-card">
                    <p>"Smart Schedule transformed how we handle shift changes. It's intuitive and beautiful."</p>
                    <div class="user-info">
                        <strong>Sarah Jenkins</strong>
                        <span>Operations Manager</span>
                    </div>
                </div>
                <div class="testimonial-card">
                    <p>"The best UI/UX I've seen in a scheduling tool. My team actually enjoys using it."</p>
                    <div class="user-info">
                        <strong>Marcus Chen</strong>
                        <span>Tech Lead</span>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="login-template">
        <div class="auth-card-container">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Enter your details to access your account</p>
                
                <form id="login-form" onsubmit="handleAuth(event, 'login')">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="name@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-row">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="link" onclick="navigateTo('forgot-password')">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                </form>
                <p class="auth-footer">Don't have an account? <a href="#" class="link" onclick="navigateTo('register')">Sign up</a></p>
            </div>
        </div>
    </template>

    <template id="register-template">
        <div class="auth-card-container">
            <div class="auth-card">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join Smart Schedule today</p>
                
                <form id="register-form" onsubmit="handleAuth(event, 'register')">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="name@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-role">Role</label>
                        <select id="reg-role" required>
                            <option value="" disabled selected>Select your role</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                            <option value="employee">Employee</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm">Confirm Password</label>
                        <input type="password" id="reg-confirm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                </form>
                <p class="auth-footer">Already have an account? <a href="#" class="link" onclick="navigateTo('login')">Log in</a></p>
            </div>
        </div>
    </template>

    <template id="forgot-password-template">
        <div class="auth-card-container">
            <div class="auth-card">
                <div class="icon-circle">
                    <i data-lucide="key-round"></i>
                </div>
                <h2>Forgot Password?</h2>
                <p class="auth-subtitle">No worries, we'll send you reset instructions.</p>
                
                <form id="forgot-form" onsubmit="handleAuth(event, 'forgot')">
                    <div class="form-group">
                        <label for="forgot-email">Email</label>
                        <input type="email" id="forgot-email" placeholder="name@company.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
                </form>
                <p class="auth-footer"><a href="#" class="link" onclick="navigateTo('login')"><i data-lucide="arrow-left" style="width:14px;height:14px;vertical-align:middle;"></i> Back to Login</a></p>
            </div>
        </div>
    </template>

    <template id="dashboard-template">
        <div class="dashboard-layout">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="logo" onclick="navigateTo('landing')">

                        <span class="logo-text">Smart Schedule</span>
                    </div>
                    <button class="sidebar-toggle" onclick="toggleSidebar()">
                        <i data-lucide="chevron-left"></i>
                    </button>
                </div>

                    <a href="#" class="nav-item" onclick="navigateTo('calendar')"><i data-lucide="calendar-days"></i> <span>Schedule</span></a>
                    <a href="#" class="nav-item" onclick="navigateTo('team')"><i data-lucide="users-2"></i> <span>Team</span></a>
                    <a href="#" class="nav-item" onclick="navigateTo('tasks')"><i data-lucide="clipboard-check"></i> <span>Tasks</span></a>
                    <a href="#" class="nav-item"><i data-lucide="bar-chart-3"></i> <span>Reports</span></a>
                    <a href="#" class="nav-item"><i data-lucide="bell"></i> <span>Notifications</span></a>
                    <a href="#" class="nav-item"><i data-lucide="settings"></i> <span>Settings</span></a>
                </nav>
                <div class="sidebar-mini-calendar">
                    <div class="mini-cal-header">
                        <span>April 2026</span>
                        <div class="cal-arrows">
                            <i data-lucide="chevron-left"></i>
                            <i data-lucide="chevron-right"></i>
                        </div>
                    </div>
                    <div class="mini-cal-grid">
                        <span class="day-label">M</span><span class="day-label">T</span><span class="day-label">W</span><span class="day-label">T</span><span class="day-label">F</span><span class="day-label">S</span><span class="day-label">S</span>
                        <span class="day active">27</span><span class="day">28</span><span class="day">29</span><span class="day">30</span>
                    </div>
                </div>
                <!-- Mini Calendar -->
                <div class="sidebar-mini-calendar">
                    <div class="mini-cal-header">
                        <span>April 2026</span>
                        <div class="cal-arrows">
                            <i data-lucide="chevron-left"></i>
                            <i data-lucide="chevron-right"></i>
                        </div>
                    </div>
                    <div class="mini-cal-grid">
                        <span class="day-label">M</span><span class="day-label">T</span><span class="day-label">W</span><span class="day-label">T</span><span class="day-label">F</span><span class="day-label">S</span><span class="day-label">S</span>
                        <span class="day muted">30</span><span class="day muted">31</span><span class="day">1</span><span class="day">2</span><span class="day">3</span><span class="day">4</span><span class="day">5</span>
                        <span class="day">6</span><span class="day">7</span><span class="day">8</span><span class="day">9</span><span class="day">10</span><span class="day">11</span><span class="day">12</span>
                        <span class="day">13</span><span class="day">14</span><span class="day">15</span><span class="day">16</span><span class="day">17</span><span class="day">18</span><span class="day">19</span>
                        <span class="day">20</span><span class="day">21</span><span class="day">22</span><span class="day">23</span><span class="day">24</span><span class="day">25</span><span class="day">26</span>
                        <span class="day active">27</span><span class="day">28</span><span class="day">29</span><span class="day">30</span><span class="day muted">1</span><span class="day muted">2</span><span class="day muted">3</span>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <div class="user-brief">
                        <img src="https://ui-avatars.com/api/?name=Alex+Johnson&background=6366f1&color=fff" alt="User" class="avatar-sm">
                        <div class="user-info-text">
                            <p class="user-name">Alex Johnson</p>
                            <p class="user-role">Manager</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Dashboard Content -->
            <div class="dashboard-main">
                <!-- Top Navbar -->
                <header class="dash-header">
                    <div class="header-left">
                        <button class="mobile-toggle" onclick="toggleSidebar()">
                            <i data-lucide="menu"></i>
                        </button>
                        <div class="search-bar">
                            <i data-lucide="search"></i>
                            <input type="text" placeholder="Search tasks, teams, schedules...">
                        </div>
                    </div>
                    <div class="header-right">
                        <button class="btn btn-primary" onclick="openModal('quick-add-modal')">
                            <i data-lucide="plus"></i> <span class="hide-mobile">Quick Add</span>
                        </button>
                        <div class="notification-bell" onclick="toggleNotificationDrawer()">
                            <i data-lucide="bell"></i>
                            <span class="badge">3</span>
                        </div>
                        <div class="user-dropdown">
                            <img src="https://ui-avatars.com/api/?name=Alex+Johnson&background=6366f1&color=fff" alt="User" class="avatar">
                            <i data-lucide="chevron-down"></i>
                        </div>
                    </div>
                </header>

                <div class="dash-content">
                    <!-- Stats Cards -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon purple"><i data-lucide="check-circle"></i></div>
                            <div class="stat-data">
                                <span class="stat-label">Total Tasks</span>
                                <h3 class="stat-value">128</h3>
                                <span class="stat-change positive">+12% this week</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon indigo"><i data-lucide="clock-3"></i></div>
                            <div class="stat-data">
                                <span class="stat-label">Hours Logged</span>
                                <h3 class="stat-value">34.5h</h3>
                                <span class="stat-change positive">+5h today</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon pink"><i data-lucide="users"></i></div>
                            <div class="stat-data">
                                <span class="stat-label">Team Members</span>
                                <h3 class="stat-value">12</h3>
                                <span class="stat-change">No change</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon orange"><i data-lucide="trending-up"></i></div>
                            <div class="stat-data">
                                <span class="stat-label">Completion Rate</span>
                                <h3 class="stat-value">94%</h3>
                                <span class="stat-change positive">+2%</span>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-grid">
                        <!-- Left Column -->
                        <div class="dash-col-large">
                            <!-- Today's Schedule -->
                            <div class="card">
                                <div class="card-header">
                                    <h3>Today's Schedule</h3>
                                    <button class="btn btn-ghost btn-sm">View Calendar</button>
                                </div>
                                <div class="schedule-timeline">
                                    <div class="timeline-item">
                                        <div class="time">09:00 AM</div>
                                        <div class="event-line"></div>
                                        <div class="event-details purple-bg">
                                            <h4>Daily Standup</h4>
                                            <p>Engineering Team • Online</p>
                                        </div>
                                    </div>
                                    <div class="timeline-item">
                                        <div class="time">11:30 AM</div>
                                        <div class="event-line"></div>

                                            <h4>Project Review</h4>
                                            <p>Design System • Room 4B</p>
                                        </div>
                                    </div>
                                    <div class="timeline-item">

                                        <div class="event-line"></div>

                                            <h4>Sprint Planning</h4>
                                            <p>Product Roadmap • Online</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Heatmap -->
                            <div class="card">
                                <div class="card-header">
                                    <h3>Team Availability Heatmap</h3>
                                    <div class="heatmap-legend">
                                        <span>Free</span>
                                        <div class="legend-scale"></div>
                                        <span>Busy</span>
                                    </div>
                                </div>
                                <div class="heatmap-container">
                                    <div class="heatmap-grid">
                                        <!-- Heatmap cells will be styled in CSS -->
                                        <div class="heatmap-row">
                                            <span class="row-label">Mon</span>
                                            <div class="cells">
                                                <div class="cell level-1"></div><div class="cell level-2"></div><div class="cell level-3"></div><div class="cell level-4"></div><div class="cell level-2"></div><div class="cell level-1"></div><div class="cell level-0"></div><div class="cell level-1"></div>
                                            </div>
                                        </div>
                                        <div class="heatmap-row">
                                            <span class="row-label">Tue</span>
                                            <div class="cells">
                                                <div class="cell level-2"></div><div class="cell level-4"></div><div class="cell level-4"></div><div class="cell level-3"></div><div class="cell level-2"></div><div class="cell level-2"></div><div class="cell level-1"></div><div class="cell level-2"></div>
                                            </div>
                                        </div>
                                        <div class="heatmap-row">
                                            <span class="row-label">Wed</span>
                                            <div class="cells">
                                                <div class="cell level-1"></div><div class="cell level-2"></div><div class="cell level-2"></div><div class="cell level-4"></div><div class="cell level-4"></div><div class="cell level-3"></div><div class="cell level-2"></div><div class="cell level-1"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="dash-col-small">
                            <!-- Upcoming Events -->
                            <div class="card">
                                <div class="card-header">
                                    <h3>Upcoming Events</h3>
                                </div>
                                <ul class="event-list">
                                    <li class="event-item">
                                        <div class="event-date">
                                            <span class="day">29</span>
                                            <span class="month">Apr</span>
                                        </div>
                                        <div class="event-info">
                                            <h4>Client Workshop</h4>
                                            <p>10:00 AM - 12:00 PM</p>
                                        </div>
                                    </li>
                                    <li class="event-item">
                                        <div class="event-date">
                                            <span class="day">30</span>
                                            <span class="month">Apr</span>
                                        </div>
                                        <div class="event-info">
                                            <h4>Marketing Sync</h4>
                                            <p>03:30 PM - 04:30 PM</p>
                                        </div>
                                    </li>
                                </ul>
                            </div>

                            <!-- Recent Activity -->
                            <div class="card">
                                <div class="card-header">
                                    <h3>Recent Activity</h3>
                                </div>
                                <div class="activity-feed">
                                    <div class="activity-item">
                                        <div class="activity-icon blue"><i data-lucide="plus"></i></div>
                                        <div class="activity-content">
                                            <p><strong>Sarah</strong> added a new shift</p>
                                            <span>2 hours ago</span>
                                        </div>
                                    </div>
                                    <div class="activity-item">
                                        <div class="activity-icon green"><i data-lucide="check"></i></div>
                                        <div class="activity-content">
                                            <p><strong>You</strong> completed Sprint Prep</p>
                                            <span>5 hours ago</span>
                                        </div>
                                    </div>
                                    <div class="activity-item">
                                        <div class="activity-icon orange"><i data-lucide="message-square"></i></div>
                                        <div class="activity-content">
                                            <p><strong>Marcus</strong> commented on Schedule</p>
                                            <span>Yesterday</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Add Modal -->
        <div id="quick-add-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Quick Add Event</h2>
                    <button class="close-btn" onclick="closeModal('quick-add-modal')">&times;</button>
                </div>
                <form onsubmit="handleQuickAdd(event)">
                    <div class="form-group">
                        <label>Event Name</label>
                        <input type="text" placeholder="Meeting Title" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select>
                            <option>Work</option>
                            <option>Personal</option>
                            <option>Team</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Save Event</button>
                </form>
            </div>
        </div>
    </template>

    <template id="calendar-template">
        <div class="dashboard-layout">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="logo" onclick="navigateTo('landing')">
                        <i data-lucide="calendar"></i>
                        <span class="logo-text">Smart Schedule</span>
                    </div>
                    <button class="sidebar-toggle" onclick="toggleSidebar()">

                    <a href="#" class="nav-item active" onclick="navigateTo('calendar')"><i data-lucide="calendar-days"></i> <span>Schedule</span></a>
                    <a href="#" class="nav-item"><i data-lucide="users-2"></i> <span>Team</span></a>

                    <a href="#" class="nav-item"><i data-lucide="bar-chart-3"></i> <span>Reports</span></a>

                </nav>
                <div class="sidebar-mini-calendar">
                    <div class="mini-cal-header">
                        <span>April 2026</span>
                    </div>
                    <div class="mini-cal-grid">
                        <span class="day-label">M</span><span class="day-label">T</span><span class="day-label">W</span><span class="day-label">T</span><span class="day-label">F</span><span class="day-label">S</span><span class="day-label">S</span>

            <div class="dashboard-main">
                <header class="dash-header">
                    <div class="header-left">
                        <button class="mobile-toggle" onclick="toggleSidebar()">
                            <i data-lucide="menu"></i>
                        </button>
                        <h2 class="view-title">Schedule</h2>
                    </div>
                    <div class="header-right">
                        <div class="view-switcher">

                            <button class="switcher-btn" onclick="switchCalendarView('week')">Week</button>
                            <button class="switcher-btn" onclick="switchCalendarView('day')">Day</button>
                            <button class="switcher-btn" onclick="switchCalendarView('agenda')">Agenda</button>
                        </div>
                        <select class="timezone-select">

                        </select>
                        <button class="btn btn-primary" onclick="openModal('event-modal')">
                            <i data-lucide="plus"></i> New Event
                        </button>

                <div class="dash-content calendar-content">
                    <div id="calendar-view-container" class="calendar-month-view">
                        <!-- Calendar Grid injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Comprehensive Event Modal -->
        <div id="event-modal" class="modal">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h2>Create New Event</h2>
                    <button class="close-btn" onclick="closeModal('event-modal')">&times;</button>
                </div>
                <form id="event-form" onsubmit="handleCreateEvent(event)">
                    <div class="form-group">
                        <label>Event Title</label>
                        <input type="text" id="event-title" placeholder="Add title" required>
                    </div>
